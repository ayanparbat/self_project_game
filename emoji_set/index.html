<body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
        <header class="hero">
            <h1 class="heading">
            <span class="eyebrow">Emoji Swap Game</span>
                Match triples, clear the board, beat the clock.
            </h1>
            <div class="flex menu_bar">
                <button id="restart_game_btn">Restart Run</button>
            </div>
        </header>

        <section class="gm_cont">
            <div class="table-wrap">
                <div class="table" id="game_table"></div>
            </div>

            <aside class="store">
                <div class="card em_store">
                    <p class="label">Holding Slot</p>
                    <div class="cell flex" id="store_emo"></div>
                </div>

                <div class="card level">
                    <p class="label">Level</p>
                    <p class="value"><span id="level">1</span></p>
                </div>

                <div class="card item_remains">
                    <p class="label">Remaining</p>
                    <p class="value"><span id="item_remains">15</span> / <span id="total_items">24</span></p>
                </div>

                <div class="card time">
                    <p class="label">Time</p>
                    <p class="value"><span id="timer_min">0</span>:<span id="timer_sec">00</span></p>
                </div>

                <div class="card score">
                    <p class="label">Score</p>
                    <p class="value"><span id="score">450</span></p>
                </div>
            </aside>

            <div class="end_msg_cont flex" id="level_up_cont">
                <div class="end_msg">
                    <p class="icon">&#x1F3C6;</p>
                    <p>Level Up!</p>
                    <p><button id="play_next_level_btn">Play Next Level</button></p>
                    <p><button id="play_again_btn">Replay This Level</button></p>
                </div>
            </div>

            <div class="end_msg_cont flex" id="game_start_anim_cont">
                <div class="end_msg">
                    <p>Starting in <span id="next_level_count">3</span>...</p>
                </div>
            </div>

            <div class="end_msg_cont flex" id="game_over_cont">
                <div class="end_msg">
                    <p>Game Over</p>
                    <p><button id="restart_level_btn">Start Again</button></p>
                </div>
            </div>

            <div class="end_msg_cont flex" id="start_game_cont" style="display:flex;">
                <div class="end_msg">
                    <p>Create a set by matching 3 identical emojis.</p>
                    <p><button id="start_game_btn">Start Game</button></p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
